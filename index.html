<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学术文献归档库</title>
    <style>
        /* 
         * =========================================
         * 核心样式表 (CSS)
         * =========================================
         */
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-sub: #666666;
            --border-radius: 8px;
            --box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        /* 布局容器 */
        .container {
            max-width: 900px;
            margin: 0 auto;
            min-height: 80vh;
        }

        /* 搜索框样式 */
        .search-container {
            margin: 0 auto 30px auto;
            max-width: 600px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1rem;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            outline: none;
            transition: var(--transition);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.2);
        }

        .search-stats {
            text-align: center;
            color: var(--text-sub);
            font-size: 0.9rem;
            margin-top: 10px;
            height: 20px; /* 占位防止跳动 */
        }

        /* 头部导航 */
        header {
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        /* 面包屑导航 (Breadcrumbs) */
        .breadcrumbs {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            color: var(--text-sub);
            margin-top: 20px;
        }

        .breadcrumb-item {
            cursor: pointer;
            color: var(--accent-color);
            transition: var(--transition);
        }

        .breadcrumb-item:hover {
            text-decoration: underline;
        }

        .breadcrumb-item.active {
            color: var(--text-sub);
            cursor: default;
            text-decoration: none;
            font-weight: 500;
        }

        .breadcrumb-separator {
            color: #ccc;
        }

        /* 内容显示区域 - 独占显示逻辑 */
        .view-section {
            display: none; /* 默认隐藏所有区域 */
            animation: fadeIn 0.4s ease;
        }

        .view-section.active {
            display: block; /* 仅激活的区域显示 */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 列表网格样式 (用于期刊和年份) */
        .grid-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 10px 0;
        }

        .card-btn {
            background: var(--card-bg);
            border: 1px solid #eee;
            border-radius: var(--border-radius);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--box-shadow);
            font-size: 1.1rem;
            font-weight: 500;
        }

        .card-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        /* 文献卡片样式 */
        .article-list {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .article-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 25px;
            box-shadow: var(--box-shadow);
            border-left: 4px solid var(--accent-color);
        }

        .article-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .article-meta {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .article-abstract {
            font-size: 0.95rem;
            color: #444;
            text-align: justify;
        }

        .abstract-label {
            font-weight: 600;
            color: var(--primary-color);
            display: block;
            margin-bottom: 5px;
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            .grid-list {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
        
        /* 空状态提示 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-sub);
            font-style: italic;
        }
    </style>
</head>
<body>

<!-- Loading Overlay -->
<div id="loading-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s;">
    <div style="font-size: 1.5rem; color: #2c3e50; margin-bottom: 10px;">正在加载文献库...</div>
    <div style="color: #666;">数据量较大，请稍候 (Parsing data...)</div>
</div>

<div class="container">
    <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="输入标题、摘要或作者关键词进行搜索...">
        <div id="search-stats" class="search-stats"></div>
    </div>
    <header>
        <h1>期刊文献数据库</h1>
        <div id="breadcrumbs" class="breadcrumbs">
            <!-- 动态生成的面包屑导航 -->
        </div>
    </header>

    <!-- 搜索结果列表 -->
    <div id="section-search" class="view-section">
        <h3 style="margin-bottom: 20px; color: var(--primary-color);">搜索结果</h3>
        <div id="search-list" class="article-list"></div>
    </div>

    <!-- 第一层：期刊列表 -->
    <div id="section-journals" class="view-section">
        <div id="journal-list" class="grid-list"></div>
    </div>

    <!-- 第二层：年份列表 -->
    <div id="section-years" class="view-section">
        <div id="year-list" class="grid-list"></div>
    </div>

    <!-- 第三层：文献列表 -->
    <div id="section-articles" class="view-section">
        <div id="article-list" class="article-list"></div>
    </div>
</div>


<script src="data.js"></script>
<script>
    /**
     * ==========================================================================================
     * 数据配置区域 (DATA CONFIGURATION)
     * 
     * 说明：
     * 1. 请将您的 Web of Science 导出的 Excel 数据转换为 JSON 格式。
     * 2. 替换下方的 DATA 变量内容。
     * 3. 确保字段名称匹配：
     *    - "Source Title": 期刊名称
     *    - "Publication Year": 发表年份 (数字)
     *    - "Article Title": 文章标题
     *    - "Author Full Names": 作者全名
     *    - "Abstract": 摘要
     * 
     * 推荐工具：使用在线 "Excel to JSON converter" 将您的 Excel 转换为 JSON 数组并粘贴于此。
     * ==========================================================================================
     */
    
    // DATA loaded from data.js

/**
     * =========================================
     * 核心逻辑控制 (JAVASCRIPT LOGIC)
     * =========================================
     */

    // 全局状态
    const state = {
        view: 'journals', // 当前视图: 'journals', 'years', 'articles'
        selectedJournal: null,
        selectedYear: null
    };

    // 配置
    const config = {
        minYear: 2015,
        maxYear: 2025
    };

    // 初始化
    function init() {
        try {
            console.log("Initializing...");
            
            // Check if DATA is valid
            if (typeof DATA === 'undefined' || !Array.isArray(DATA)) {
                throw new Error("Data not loaded correctly.");
            }
            
            console.log(`Loaded ${DATA.length} records.`);
            
            setupSearch();
            render();
            
            // Hide loading overlay
            const overlay = document.getElementById('loading-overlay');
            if (overlay) {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.remove(), 500);
            }
        } catch (e) {
            console.error(e);
            alert("数据加载失败，请检查控制台日志。\nError: " + e.message);
            document.getElementById('loading-overlay').innerHTML = `<div style='color:red; padding:20px;'>Error: ${e.message}</div>`;
        }
    }

    // 渲染主函数：根据状态决定显示哪个界面
    function render() {
        // 隐藏所有区域
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        
        // 更新面包屑
        updateBreadcrumbs();

        // 根据状态显示对应区域
        if (state.view === 'search') {
            document.getElementById('section-search').classList.add('active');
            renderSearchResults();
        } else if (state.view === 'journals') {
            document.getElementById('section-journals').classList.add('active');
            renderJournalList();
        } else if (state.view === 'years') {
            document.getElementById('section-years').classList.add('active');
            renderYearList();
        } else if (state.view === 'articles') {
            document.getElementById('section-articles').classList.add('active');
            renderArticleList();
        }
    }

    function updateBreadcrumbs() {
        const container = document.getElementById('breadcrumbs');
        let html = `<span class="breadcrumb-item ${state.view === 'journals' ? 'active' : ''}" onclick="resetToJournals()">所有期刊</span>`;

        if (state.view === 'search') {
             html += ` <span class="breadcrumb-separator">/</span> 
                      <span class="breadcrumb-item active">搜索结果: "${state.searchQuery}"</span>`;
        } else {
            if (state.selectedJournal) {
                html += ` <span class="breadcrumb-separator">/</span> 
                          <span class="breadcrumb-item ${state.view === 'years' ? 'active' : ''}" onclick="backToYears()">${state.selectedJournal}</span>`;
            }
    
            if (state.selectedYear) {
                html += ` <span class="breadcrumb-separator">/</span> 
                          <span class="breadcrumb-item active">${state.selectedYear}</span>`;
            }
        }

        container.innerHTML = html;
    }

    // 渲染期刊列表 (一级分类)
    function renderJournalList() {
        const container = document.getElementById('journal-list');
        // 获取所有不重复的期刊名
        const journals = [...new Set(DATA.map(item => item["Source Title"]))].filter(Boolean).sort();
        
        if (journals.length === 0) {
            container.innerHTML = '<div class="empty-state">暂无期刊数据，请检查 DATA 变量配置。</div>';
            return;
        }

        container.innerHTML = journals.map(journal => `
            <div class="card-btn" onclick="selectJournal('${journal.replace(/'/g, "\\'")}')">
                ${journal}
            </div>
        `).join('');
    }

    // 渲染年份列表 (二级分类)
    function renderYearList() {
        const container = document.getElementById('year-list');
        if (!state.selectedJournal) return;

        // 筛选当前期刊的数据
        const journalData = DATA.filter(item => item["Source Title"] === state.selectedJournal);
        
        // 获取年份并过滤范围 (2015-2025)
        const years = [...new Set(journalData.map(item => parseInt(item["Publication Year"])))];
        const filteredYears = years.filter(y => y >= config.minYear && y <= config.maxYear).sort((a, b) => b - a); // 降序排列

        if (filteredYears.length === 0) {
            container.innerHTML = `<div class="empty-state">该期刊在 ${config.minYear}-${config.maxYear} 年间无收录文献。</div>`;
            return;
        }

        container.innerHTML = filteredYears.map(year => `
            <div class="card-btn" onclick="selectYear(${year})">
                ${year} 年
            </div>
        `).join('');
    }

    // 渲染文献列表 (三级分类)
    function renderArticleList() {
        const container = document.getElementById('article-list');
        if (!state.selectedJournal || !state.selectedYear) return;

        // 筛选特定期刊 + 特定年份的数据
        const articles = DATA.filter(item => 
            item["Source Title"] === state.selectedJournal && 
            parseInt(item["Publication Year"]) === state.selectedYear
        );

        if (articles.length === 0) {
            container.innerHTML = '<div class="empty-state">暂无文献。</div>';
            return;
        }

        container.innerHTML = articles.map(article => `
            <div class="article-card">
                <div class="article-title">${article["Article Title"] || "无标题"}</div>
                <div class="article-meta">
                    <strong>作者:</strong> ${article["Author Full Names"] || "未知作者"}
                </div>
                <div class="article-abstract">
                    <span class="abstract-label">摘要:</span>
                    ${article["Abstract"] || "暂无摘要"}
                </div>
            </div>
        `).join('');
        
        // 自动滚回到顶部
        window.scrollTo(0, 0);
    }

    // === 交互动作 ===

    function selectJournal(journalName) {
        state.selectedJournal = journalName;
        state.view = 'years';
        render();
    }

    function selectYear(year) {
        state.selectedYear = year;
        state.view = 'articles';
        render();
    }

    function resetToJournals() {
        state.selectedJournal = null;
        state.selectedYear = null;
        state.view = 'journals';
        render();
    }

    function backToYears() {
        state.selectedYear = null;
        state.view = 'years';
        render();
    }

    // === 搜索功能 ===

    function renderSearchResults() {
        const container = document.getElementById('search-list');
        const stats = document.getElementById('search-stats');
        const query = state.searchQuery ? state.searchQuery.trim().toLowerCase() : '';

        if (!query) {
            container.innerHTML = '<div class="empty-state">请输入关键词进行搜索</div>';
            stats.textContent = '';
            return;
        }

        // 搜索逻辑
        const results = [];
        const maxResults = 100; // 限制显示数量以保证性能
        
        for (let i = 0; i < DATA.length; i++) {
            const item = DATA[i];
            const title = (item["Article Title"] || "").toLowerCase();
            const abstract = (item["Abstract"] || "").toLowerCase();
            const author = (item["Author Full Names"] || "").toLowerCase();

            if (title.includes(query) || abstract.includes(query) || author.includes(query)) {
                results.push(item);
                if (results.length >= maxResults) break;
            }
        }

        // 更新统计
        stats.textContent = `找到 ${results.length}${results.length >= maxResults ? '+' : ''} 条匹配结果`;

        if (results.length === 0) {
            container.innerHTML = '<div class="empty-state">未找到匹配的文献</div>';
            return;
        }

        // 渲染结果
        container.innerHTML = results.map(article => {
            // 高亮处理
            const highlight = (text) => {
                if (!text) return "";
                const regex = new RegExp(`(${state.searchQuery.trim()})`, 'gi');
                return text.replace(regex, '<span style="background-color: #fff3cd; color: #856404;">$1</span>');
            };

            return `
            <div class="article-card">
                <div class="article-title">${highlight(article["Article Title"] || "无标题")}</div>
                <div class="article-meta">
                    <strong>年份:</strong> ${article["Publication Year"]} | 
                    <strong>期刊:</strong> ${article["Source Title"]} |
                    <strong>作者:</strong> ${highlight(article["Author Full Names"] || "未知作者")}
                </div>
                <div class="article-abstract">
                    <span class="abstract-label">摘要:</span>
                    ${highlight(article["Abstract"] || "暂无摘要")}
                </div>
            </div>
            `;
        }).join('');
    }

    // 搜索输入监听 (防抖)
    let debounceTimer;
    function setupSearch() {
        const input = document.getElementById('search-input');
        if (!input) return;

        input.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const val = e.target.value.trim();
                if (val) {
                    state.searchQuery = val;
                    state.view = 'search';
                } else {
                    state.searchQuery = '';
                    // 如果清空搜索，返回到之前的视图或期刊列表
                    state.view = state.selectedJournal ? (state.selectedYear ? 'articles' : 'years') : 'journals';
                }
                render();
            }, 300); // 300ms 延迟
        });
    }

    // 启动应用
    window.addEventListener('DOMContentLoaded', init);

</script>

</body>
</html>
