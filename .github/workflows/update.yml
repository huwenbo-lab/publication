name: Weekly Update

on:
  schedule:
    - cron: "10 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip xlrd

      - name: Update articles
        run: python update.py --days 30 --skip-derived

      - name: Rebuild derived outputs
        run: |
          python build_lit_db.py
          python build_article_api.py
          python build_search_db.py
          python check_quality.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles.json data.json data.js update_log.md lit_db api data_quality_report.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Weekly data refresh"
          git push origin HEAD:main
